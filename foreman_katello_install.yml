---
- name: Install and configure Foreman + Katello
  hosts: "{{ its_specific_host }}"
  become: true
  gather_facts: true

  vars:
    foreman_version: "3.17"
    katello_version: "4.19"
    puppet_major_version: "8"

    foreman_release_rpm_url: "https://yum.theforeman.org/releases/{{ foreman_version }}/el9/x86_64/foreman-release.rpm"
    katello_release_rpm_url: "https://yum.theforeman.org/katello/{{ katello_version }}/katello/el9/x86_64/katello-repos-latest.rpm"
    puppet_release_rpm_url: "https://yum.puppet.com/puppet{{ puppet_major_version }}-release-el-9.noarch.rpm"

    foreman_release_rpm_file: "/tmp/foreman-release.rpm"
    katello_release_rpm_file: "/tmp/katello-repos-latest.rpm"
    puppet_release_rpm_file: "/tmp/puppet-release-el9.noarch.rpm"

    foreman_admin_user: "admin"
    foreman_password_file: "/root/.foreman_admin_password"
    foreman_hammer_config_dir: "/root/.hammer"
    foreman_hammer_config_file: "/root/.hammer/cli_config.yml"

    foreman_management_network_cidr: "10.0.0.0/24"

    foreman_provisioning_network_name: "vmware-provisioning"
    foreman_provisioning_network: "192.168.100.0"
    foreman_provisioning_netmask: "255.255.255.0"
    foreman_provisioning_network_cidr: "192.168.100.0/24"
    foreman_provisioning_ip: "192.168.100.10"
    foreman_dhcp_range_from: "192.168.100.100"
    foreman_dhcp_range_to: "192.168.100.200"
    foreman_dhcp_range: "{{ foreman_dhcp_range_from }} {{ foreman_dhcp_range_to }}"
    foreman_dhcp_gateway: "192.168.100.1"

    foreman_dns_zone: "duncan-networks.com"
    foreman_reverse_zone: "100.168.192.in-addr.arpa"

    foreman_dns_forwarders:
      - "1.1.1.1"
      - "8.8.8.8"

    foreman_dhcp_nameservers:
      - "{{ foreman_provisioning_ip }}"

    effective_hostname: "{{ survey_hostname | default('') | trim }}"
    effective_organization: "{{ survey_organization | default('') | trim }}"
    effective_initial_location: "{{ survey_initial_location | default('') | trim | default('Lab', true) }}"
    foreman_server_fqdn: "{{ effective_hostname if (effective_hostname | length > 0) else ansible_facts['fqdn'] }}"

    # Optional survey variable if DNS is not available in your home lab
    foreman_server_ip: "{{ survey_foreman_server_ip | default(ansible_default_ipv4.address, true) }}"

    # Preferred API targets in order
    foreman_api_candidates:
      - "{{ foreman_server_fqdn }}"
      - "{{ foreman_server_ip }}"
      - "127.0.0.1"

  pre_tasks:
    - name: Fail if organization was not provided
      ansible.builtin.fail:
        msg: "The survey variable 'survey_organization' is required."
      when: effective_organization | length == 0

    - name: Fail if target system is not EL9
      ansible.builtin.fail:
        msg: >-
          This playbook requires EL9 for Foreman/Katello.
          Detected {{ ansible_distribution }} {{ ansible_distribution_major_version }}.
      when: ansible_distribution_major_version != "9"

    - name: Check enabled repositories
      ansible.builtin.command: dnf repolist --enabled
      register: enabled_repos
      changed_when: false

    - name: Fail if BaseOS/AppStream repos are not available
      ansible.builtin.fail:
        msg: >-
          This host does not have the required EL9 content repositories enabled.
          Foreman/Katello provisioning dependencies require RHEL BaseOS and AppStream.
      when:
        - "'baseos' not in (enabled_repos.stdout | lower)"
        - "'appstream' not in (enabled_repos.stdout | lower)"

    - name: Check whether the Foreman admin password file already exists
      ansible.builtin.stat:
        path: "{{ foreman_password_file }}"
      register: foreman_password_file_stat

    - name: Read existing Foreman admin password
      ansible.builtin.slurp:
        path: "{{ foreman_password_file }}"
      register: foreman_password_file_content
      when: foreman_password_file_stat.stat.exists

    - name: Set Foreman admin password from existing file
      ansible.builtin.set_fact:
        foreman_admin_password: "{{ foreman_password_file_content.content | b64decode | trim }}"
      when: foreman_password_file_stat.stat.exists

    - name: Generate a new random Foreman admin password
      ansible.builtin.set_fact:
        foreman_admin_password: >-
          {{ lookup(
               'ansible.builtin.password',
               '/dev/null',
               chars=['ascii_letters', 'digits'],
               length=24
             ) }}
      when: not foreman_password_file_stat.stat.exists

    - name: Save generated Foreman admin password to root-only file
      ansible.builtin.copy:
        dest: "{{ foreman_password_file }}"
        content: "{{ foreman_admin_password }}\n"
        owner: root
        group: root
        mode: "0600"
      when: not foreman_password_file_stat.stat.exists

  tasks:
    - name: Update hostname if provided by survey
      ansible.builtin.hostname:
        name: "{{ effective_hostname }}"
      when: effective_hostname | length > 0

    - name: Refresh facts after hostname change
      ansible.builtin.setup:
      when: effective_hostname | length > 0

    - name: Ensure local hosts entry exists for Foreman FQDN when DNS is unavailable
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '.*\s{{ foreman_server_fqdn | regex_escape() }}(\s|$)'
        line: "{{ foreman_server_ip }} {{ foreman_server_fqdn }}"
        state: present
      when:
        - foreman_server_ip is defined
        - foreman_server_ip | length > 0
        - foreman_server_fqdn is defined
        - foreman_server_fqdn | length > 0

    - name: Ensure base packages are installed
      ansible.builtin.dnf:
        name:
          - firewalld
          - curl
          - wget
          - vim
          - bind
          - bind-utils
          - dhcp-server
          - tftp-server
          - syslinux-tftpboot
        state: present

    - name: Enable and start firewalld
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    - name: Download Foreman release RPM
      ansible.builtin.get_url:
        url: "{{ foreman_release_rpm_url }}"
        dest: "{{ foreman_release_rpm_file }}"
        mode: "0644"

    - name: Download Katello release RPM
      ansible.builtin.get_url:
        url: "{{ katello_release_rpm_url }}"
        dest: "{{ katello_release_rpm_file }}"
        mode: "0644"

    - name: Download Puppet release RPM
      ansible.builtin.get_url:
        url: "{{ puppet_release_rpm_url }}"
        dest: "{{ puppet_release_rpm_file }}"
        mode: "0644"

    - name: Install Foreman release RPM from local file
      ansible.builtin.dnf:
        name: "{{ foreman_release_rpm_file }}"
        state: present
        disable_gpg_check: true

    - name: Install Katello release RPM from local file
      ansible.builtin.dnf:
        name: "{{ katello_release_rpm_file }}"
        state: present
        disable_gpg_check: true

    - name: Install Puppet release RPM from local file
      ansible.builtin.dnf:
        name: "{{ puppet_release_rpm_file }}"
        state: present
        disable_gpg_check: true

    - name: Clean DNF metadata
      ansible.builtin.command: dnf clean all
      changed_when: true

    - name: Rebuild DNF cache
      ansible.builtin.command: dnf makecache
      changed_when: true

    - name: Ensure puppet-agent is available before Foreman installer
      ansible.builtin.dnf:
        name: puppet-agent
        state: present
        disable_gpg_check: true

    - name: Install foreman-installer-katello package
      ansible.builtin.dnf:
        name: foreman-installer-katello
        state: present
        disable_gpg_check: true

    - name: Open required firewall ports
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - 80/tcp
        - 443/tcp
        - 53/tcp
        - 53/udp
        - 67/udp
        - 69/udp
        - 5647/tcp

    - name: Check whether Foreman is already installed
      ansible.builtin.stat:
        path: /etc/foreman-installer/scenarios.d/katello-answers.yaml
      register: foreman_katello_installed

    - name: Run foreman-installer with Katello scenario and isolated provisioning services
      ansible.builtin.command:
        argv:
          - foreman-installer
          - --scenario
          - katello
          - --foreman-initial-organization
          - "{{ effective_organization }}"
          - --foreman-initial-location
          - "{{ effective_initial_location }}"
          - --foreman-initial-admin-username
          - "{{ foreman_admin_user }}"
          - --foreman-initial-admin-password
          - "{{ foreman_admin_password }}"
          - --enable-dns
          - --enable-dns-proxy
          - --dns-zone
          - "{{ foreman_dns_zone }}"
          - --dns-reverse
          - "{{ foreman_reverse_zone }}"
          - --dns-forwarders
          - "{{ foreman_dns_forwarders | join(',') }}"
          - --enable-dhcp
          - --enable-dhcp-proxy
          - --dhcp-range
          - "{{ foreman_dhcp_range }}"
          - --dhcp-gateway
          - "{{ foreman_dhcp_gateway }}"
          - --dhcp-nameservers
          - "{{ foreman_dhcp_nameservers | join(',') }}"
          - --enable-tftp
          - --enable-tftp-proxy
      register: foreman_installer_result
      when: not foreman_katello_installed.stat.exists
      changed_when: true

    - name: Show foreman-installer output when installer ran
      ansible.builtin.debug:
        var: foreman_installer_result.stdout_lines
      when:
        - not foreman_katello_installed.stat.exists
        - foreman_installer_result is defined

    - name: Check Foreman managed services
      ansible.builtin.command: foreman-maintain service list
      register: foreman_service_list
      changed_when: false
      failed_when: false

    - name: Show Foreman managed services
      ansible.builtin.debug:
        var: foreman_service_list.stdout_lines

    - name: Check listeners on 80/443
      ansible.builtin.shell: |
        ss -ltnp | egrep ':(80|443)\s'
      args:
        executable: /bin/bash
      register: foreman_listeners
      changed_when: false
      failed_when: false

    - name: Show listeners on 80/443
      ansible.builtin.debug:
        var: foreman_listeners.stdout_lines

    - name: Check whether Foreman API responds via candidate endpoints
      ansible.builtin.uri:
        url: "https://{{ item }}/api/status"
        method: GET
        user: "{{ foreman_admin_user }}"
        password: "{{ foreman_admin_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
        timeout: 20
      loop: "{{ foreman_api_candidates | unique }}"
      register: foreman_api_probe
      ignore_errors: true
      changed_when: false

    - name: Select first working Foreman API endpoint
      ansible.builtin.set_fact:
        foreman_api_host: "{{ item.item }}"
      loop: "{{ foreman_api_probe.results }}"
      when:
        - foreman_api_host is not defined
        - not (item.failed | default(false))
        - (item.status | default(0)) == 200

    - name: Fail if no Foreman API endpoint responded
      ansible.builtin.fail:
        msg: |-
          Foreman API did not respond on any tested endpoint: {{ foreman_api_candidates | unique | join(', ') }}

          foreman-maintain service list:
          {{ foreman_service_list.stdout | default('no output') }}

          ss listeners:
          {{ foreman_listeners.stdout | default('no output') }}

          Hint:
          - If DNS is unavailable, pass survey_foreman_server_ip.
          - If nothing is listening on 443, inspect installer logs:
            /var/log/foreman-installer/katello.log
      when: foreman_api_host is not defined

    - name: Ensure Hammer config directory exists
      ansible.builtin.file:
        path: "{{ foreman_hammer_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Configure Hammer CLI authentication
      ansible.builtin.copy:
        dest: "{{ foreman_hammer_config_file }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          :foreman:
            :host: "https://{{ foreman_api_host }}"
            :username: "{{ foreman_admin_user }}"
            :password: "{{ foreman_admin_password }}"
          :ui:
            :interactive: false
          :watch_plain: true

    - name: Check whether provisioning domain exists
      ansible.builtin.command:
        argv:
          - hammer
          - domain
          - info
          - --name
          - "{{ foreman_dns_zone }}"
      register: foreman_domain_info
      failed_when: false
      changed_when: false

    - name: Create provisioning domain in Foreman
      ansible.builtin.command:
        argv:
          - hammer
          - domain
          - create
          - --name
          - "{{ foreman_dns_zone }}"
          - --organizations
          - "{{ effective_organization }}"
          - --locations
          - "{{ effective_initial_location }}"
      when: foreman_domain_info.rc != 0

    - name: Discover integrated Smart Proxy ID
      ansible.builtin.shell: |
        set -o pipefail
        hammer --csv proxy list | awk -F, -v name="{{ foreman_server_fqdn }}" '$2 == name {print $1}'
      args:
        executable: /bin/bash
      register: foreman_proxy_id
      changed_when: false
      failed_when: false

    - name: Fallback proxy lookup by API host
      ansible.builtin.shell: |
        set -o pipefail
        hammer --csv proxy list | awk -F, -v name="{{ foreman_api_host }}" '$2 == name {print $1}'
      args:
        executable: /bin/bash
      register: foreman_proxy_id_fallback
      changed_when: false
      failed_when: false
      when: foreman_proxy_id.stdout | default('') | trim == ""

    - name: Set final Smart Proxy ID
      ansible.builtin.set_fact:
        foreman_proxy_id_final: >-
          {{
            (foreman_proxy_id.stdout | default('') | trim)
            if (foreman_proxy_id.stdout | default('') | trim | length > 0)
            else (foreman_proxy_id_fallback.stdout | default('') | trim)
          }}

    - name: Fail if Smart Proxy ID could not be determined
      ansible.builtin.fail:
        msg: "Could not determine integrated Smart Proxy ID from hammer proxy list."
      when: foreman_proxy_id_final | length == 0

    - name: Check whether provisioning subnet exists
      ansible.builtin.command:
        argv:
          - hammer
          - subnet
          - info
          - --name
          - "{{ foreman_provisioning_network_name }}"
      register: foreman_subnet_info
      failed_when: false
      changed_when: false

    - name: Create provisioning subnet in Foreman
      ansible.builtin.command:
        argv:
          - hammer
          - subnet
          - create
          - --name
          - "{{ foreman_provisioning_network_name }}"
          - --network
          - "{{ foreman_provisioning_network }}"
          - --mask
          - "{{ foreman_provisioning_netmask }}"
          - --gateway
          - "{{ foreman_dhcp_gateway }}"
          - --dns-primary
          - "{{ foreman_provisioning_ip }}"
          - --dns-secondary
          - "{{ foreman_dns_forwarders[0] }}"
          - --from
          - "{{ foreman_dhcp_range_from }}"
          - --to
          - "{{ foreman_dhcp_range_to }}"
          - --ipam
          - DHCP
          - --boot-mode
          - DHCP
          - --organizations
          - "{{ effective_organization }}"
          - --locations
          - "{{ effective_initial_location }}"
          - --domains
          - "{{ foreman_dns_zone }}"
          - --dhcp-id
          - "{{ foreman_proxy_id_final }}"
          - --dns-id
          - "{{ foreman_proxy_id_final }}"
          - --tftp-id
          - "{{ foreman_proxy_id_final }}"
      when: foreman_subnet_info.rc != 0

  post_tasks:
    - name: Show Foreman install summary
      ansible.builtin.debug:
        msg:
          - "Foreman + Katello installation completed."
          - "Primary URL/FQDN: https://{{ foreman_server_fqdn }}"
          - "Working API endpoint: https://{{ foreman_api_host }}"
          - "Organization: {{ effective_organization }}"
          - "Initial Location: {{ effective_initial_location }}"
          - "Management network: {{ foreman_management_network_cidr }}"
          - "Provisioning network: {{ foreman_provisioning_network_cidr }}"
          - "Provisioning subnet name in Foreman: {{ foreman_provisioning_network_name }}"
          - "Provisioning gateway: {{ foreman_dhcp_gateway }}"
          - "DNS zone in Foreman: {{ foreman_dns_zone }}"
          - "Reverse zone: {{ foreman_reverse_zone }}"
          - "Admin User: {{ foreman_admin_user }}"
          - "Admin Password: {{ foreman_admin_password }}"